shell zsh

# === Шрифты ===
font_family      Ioskeley Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Антиалиасинг
disable_ligatures never

# === Курсор ===
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier 5.0
pixel_scroll yes
momentum_scroll 0.96

# === URL обработка ===
url_color #0087bd
url_style curly
open_url_with default
detect_urls yes

# === Выделение ===
copy_on_select yes
strip_trailing_spaces smart

# === Звонок ===
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

# === Окна ===
remember_window_size  yes
initial_window_width  1200
initial_window_height 700
window_padding_width 8
window_padding_height 8
window_border_width 0
hide_window_decorations yes
confirm_os_window_close 0

# === Табы ===
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# === Прозрачность (для Hyprland) ===
background_opacity 0.92
background_blur 32

# === Цветовая схема - Tokyo Night ===
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467C

# Черный
color0 #15161E
color8 #414868

# Красный
color1 #f7768e
color9 #f7768e

# Зеленый
color2  #9ece6a
color10 #9ece6a

# Желтый
color3  #e0af68
color11 #e0af68

# Синий
color4  #7aa2f7
color12 #7aa2f7

# Пурпурный
color5  #bb9af7
color13 #bb9af7

# Циан
color6  #7dcfff
color14 #7dcfff

# Белый
color7  #a9b1d6
color15 #c0caf5

# === Производительность ===
repaint_delay 10
input_delay 3
sync_to_monitor yes

# === Горячие клавиши ===
# Копирование/вставка



# Новые окна/табы





# Навигация по табам



# Размер шрифта




# Скроллинг







# Поиск


# === Shell интеграция ===
shell_integration enabled

# === Дополнительно ===
allow_remote_control yes
listen_on unix:/tmp/kitty
term xterm-kitty


# === Modern kitty UX ===

# Cursor trail
cursor_trail 1
cursor_trail_decay 0.1 0.25
cursor_trail_start_threshold 2
cursor_trail_color #7aa2f7

# Smart tab titles
tab_activity_symbol "● "
tab_title_max_length 40
tab_title_template "{fmt.fg.red}{bell_symbol}{fmt.fg.yellow}{activity_symbol}{fmt.fg.tab}{sup.index} {layout_name[:1].upper()}:{title}"
active_tab_title_template "{fmt.bold}{sup.index} {layout_name[:1].upper()}:{title}{fmt.nobold}"

# Better hints









# Diff



# SSH UX



# File picker, new in recent kitty



# Command palette, useful after recent versions


# Scrollbar: macOS-like, appears only when useful
scrollbar scrolled-and-hovered
scrollbar_interactive yes
scrollbar_width 0.5
scrollbar_hover_width 1
scrollbar_handle_opacity 0.45
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0.08
scrollbar_handle_color #7aa2f7

# Long command notifications
notify_on_cmd_finish invisible 10.0 notify

# === Keybinds: Zed-like ===

# --- macOS/Zed-like project/window actions on Alt ---

map alt+space command_palette

map alt+w close_window
map alt+shift+w close_tab

map alt+s edit_config_file
map alt+shift+s launch --type=overlay kitty +kitten ssh

map alt+r launch --type=overlay zsh -ic 'task'
map alt+f toggle_maximized
map alt+t new_tab
map alt+enter new_window
map alt+o launch --type=overlay zsh -ic 'printf "Recent projects are editor-specific\n"; exec zsh
map alt+n select_tab
map alt+p set_tab_title

# Zed movement: previous/next item ~= previous/next tab
map alt+h previous_tab
map alt+l next_tab

# Dock-like movement ~= window focus
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+shift+h neighboring_window left
map alt+shift+l neighboring_window right

# Layouts
map alt+shift+f toggle_fullscreen
map alt+shift+l next_layout
map alt+1 goto_layout stack
map alt+2 goto_layout tall
map alt+3 goto_layout splits
map alt+4 goto_layout grid

# Git-like helpers
map alt+g kitten diff
map alt+g>l launch --type=overlay lazygit
map alt+g>h kitten hints --type hash --program -
map alt+g>d kitten diff


# --- Ctrl/right-alt style actions ---

# Keep terminal-friendly defaults for shell, but add useful kitty actions
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Search / scrollback
map ctrl+f search_scrollback
map ctrl+alt+f show_scrollback

# Copy/paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Save-like terminal action: copy last command output
map ctrl+s copy_last_command_output
map ctrl+alt+s copy_selection_or_last_command_output

# File/path/link hints, similar to file finder / picker
map ctrl+space kitten hints --type path --program -
map ctrl+alt+space kitten choose-files
map ctrl+alt+o launch --type=overlay zsh

# Bookmarks-ish: mark current scrollback position via shell integration is not a direct kitty feature
map ctrl+b show_last_command_output

# Forward/back in shell-integrated command output
map ctrl+alt+h previous_prompt
map ctrl+alt+l next_prompt


# --- Vim-like terminal navigation, matching your Zed mental model ---

# Careful: these override shell/program Ctrl-H/J/K/L inside kitty.
# Enable only if you really want terminal-level pane navigation.
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Alternative safer version:
# map ctrl+alt+h neighboring_window left
# map ctrl+alt+j neighboring_window down
# map ctrl+alt+k neighboring_window up
# map ctrl+alt+l neighboring_window right


# --- Hints: keyboard-driven semantic selection ---

map ctrl+shift+u open_url_with_hints
map alt+u open_url_with_hints

map alt+shift+f kitten hints --type path --program -
map alt+shift+l kitten hints --type line --program -
map alt+shift+w kitten hints --type word --program -
map alt+shift+h kitten hints --type hash --program -
map alt+shift+n kitten hints --type linenum
map alt+shift+y kitten hints --type hyperlink


# --- Diff ---

map ctrl+shift+g kitten diff
map alt+c kitten diff


# --- SSH UX ---

map alt+shift+s launch --type=overlay kitten ssh
map ctrl+shift+s launch --type=tab kitten ssh


# --- Scrolling ---

map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end
