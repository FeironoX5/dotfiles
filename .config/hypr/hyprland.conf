
# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto

# change monitor to high resolution, the last argument is the scale factor
monitor = , highres, auto, 2
monitor = HDMI-A-1, highres, auto-right, 1.5, bitdepth, 10, cm, auto, mirror, eDP-1
monitor = DP-1, highres, auto-right, 1.5, bitdepth, 10, cm, auto, mirror, eDP-1
workspace = name:10, monitor:HDMI-A-1, default:true


# unscale XWayland
xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE,2.6
env = XCURSOR_SIZE,32



###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus /
$menu = albert toggle
#wofi --show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec-once = waybar
exec-once = albert
exec-once = hyprpaper
exec-once = hyprlock
exec-once = lavalauncher
exec-once = hyprpm reload -n
exec-once = clipse -listen
exec-once = hyprsunset -t 4500
exec-once = hypridle
exec-once = ~/scripts/run_widgets.sh
exec-once = ollama serve
exec-once = ollama run gemma3 &
# exec-once = /usr/libexec/kdeconnectd

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
# 1,1,3,1
general {
    gaps_in = 0.5
    gaps_out = 1,1,68,1
    border_size = 1

    snap {
        window_gap = 16
    }

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(a0a0a022) rgba(373633ff) 45deg
    col.inactive_border = rgba(37363355)

    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 7

    # Change transparency of focused and unfocused windows
    active_opacity = 1
    inactive_opacity = 0.95

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8            # kernel radius; 7–10 feels like macOS panes
        passes = 3          # 3–4 smooths edges without going mushy
        new_optimizations = true
        ignore_opacity = false
        xray = false        # macOS respects occlusion
        popups = true
        special = true

        noise = 0.1       # subtle grain like macOS
        contrast = 1.5    # a tad less contrast behind glass
        brightness = 0.7  # slightly brighter to mimic light “vibrancy”
        vibrancy = 0     # boost saturation modestly
        vibrancy_darkness = 10

        #noise = 0.015       # subtle grain like macOS
        #contrast = 0.95     # a tad less contrast behind glass
        #brightness = 1.12   # slightly brighter to mimic light “vibrancy”
        #vibrancy = 0.25     # boost saturation modestly
        #vibrancy_darkness = 0.20
    }


    shadow {
        enabled = true
        range = 200
        render_power = 4
        color = rgba(0,0,0,0.8)
        color_inactive = rgba(0,0,0,0.5)
        ignore_window = false
        offset = 0, 12
        scale = 0.96
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
   workspace_wraparound = false
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier, popin
    animation = windowsOut, 1, 7, default, gnomed
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default, slide
    animation = specialWorkspace, 1, 3, default, slidefadevert 20%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle,ctrl:nocaps

    follow_mouse = 1

    sensitivity = -0.2
    accel_profile = custom
    scroll_points = -1 -1
    scroll_factor = 0.6

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 0.6
        tap-and-drag = true
        drag_lock = false
    }

}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = true
}
#gesture = 3, up, togglespecialworkspace

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = pixart-hp-usb-optical-mouse
    sensitivity = -0.8
}

device {
    name = sigmamicro-usb-optical-mouse
    sensitivity = -0.8
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = , mouse:274, exec,
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, P, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, escape, exec, hyprlock
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, D, exec, flatpak run app.drey.Dialect
bind = $mainMod, A, exec, flatpak run com.jeffser.Alpaca
bind = $mainMod, B, exec, flatpak run org.gnome.gitlab.cheywood.Buffer
bind = $mainMod, M, togglespecialworkspace
bind = ALT, TAB, togglespecialworkspace
bind = SUPERSHIFT, M, movetoworkspacesilent, special
bind = SUPER, V, exec,  $terminal --class clipse -e 'clipse'
bind = $mainMod, R, exec, $HOME/scripts/change_wallpaper.sh
bind = $mainMod, right, workspace, +1
bind = $mainMod, left, workspace, -1
bind = $mainMod, up, workspace, e+1
bind = $mainMod, down, workspace, e-1
bind = $mainMod, L, workspace, +1
bind = $mainMod, H, workspace, -1
bind = $mainMod, K, workspace, e+1
bind = $mainMod, J, workspace, e-1
bind = $mainMod, O, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = SUPERSHIFT, R, exec, timedatectl set-local-rtc 1 --adjust-system-clock
bind = SUPERSHIFT, R, exec, kill -s SIGRTMIN+15 $(pgrep waybar)
bind = SUPERSHIFT, R, exec, pkill layer-webview && ~/scripts/run_widgets.sh
bind = $mainMod, N, resizeactive, 0 -10

# ALT = MOVE FOCUS
bind = $mainMod ALT, left, movefocus, l
bind = $mainMod ALT, right, movefocus, r
bind = $mainMod ALT, up, movefocus, u
bind = $mainMod ALT, down, movefocus, d
bind = $mainMod ALT, h, movefocus, l
bind = $mainMod ALT, l, movefocus, r
bind = $mainMod ALT, k, movefocus, u
bind = $mainMod ALT, j, movefocus, d

# CTRL = RESIZE
bind = $mainMod CTRL, left, resizeactive, -50 0
bind = $mainMod CTRL, right, resizeactive, 50 0
bind = $mainMod CTRL, up, resizeactive, 0 -50
bind = $mainMod CTRL, down, resizeactive, 0 50
bind = $mainMod CTRL, h, resizeactive, -50 0
bind = $mainMod CTRL, l, resizeactive, 50 0
bind = $mainMod CTRL, k, resizeactive, 0 -50
bind = $mainMod CTRL, j, resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPERSHIFT, right, movetoworkspace, +1
bind = SUPERSHIFT, left, movetoworkspace, -1
bind = SUPERSHIFT, up, movetoworkspace, e+1
bind = SUPERSHIFT, down, movetoworkspace, e-1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

